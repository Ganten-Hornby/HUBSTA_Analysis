seed_everything: 42

data:
  class_path: data_model.datamodel.MyDataModule
  init_args:
    data_name: Mnist
    pca_dim: 128
    batch_size: 56000
    num_workers: 1
    K: 5
    n_f_per_cluster: 3
    l_token: 10
    data_path: /zangzelin/data


model:
  class_path: model.baseline.DMTEVT_model
  init_args:
    num_input_dim: 64
    method: 'tsne'
    n_components: 2
    perplexity: 30
    early_exaggeration: 12
trainer:
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      name: test
      project: DMTNML
      save_dir: wandb
  callbacks:
    - class_path: call_backs.EvalAcc_high_low_emb_baseline.EvalCallBack
      init_args:
        inter: 1
        dirpath: 'zzl_checkpoints/'
        dataset: 'mnist'
    # - class_path: call_backs.MaskExp.MaskExpCallBack
    #   init_args:
    #     inter: 100
  max_epochs: 1
  devices: 1
  accelerator: gpu
  check_val_every_n_epoch: 1
  enable_checkpointing: False
  # enable_progress_bar: False
# trainer.strategy: ddp_find_unused_parameters_true
# trainer.strategy: ddp