seed_everything: 42
data:
  batch_size: 500
  num_workers: 4
  data_name: Mnist
  K: 5
  pca_dim: 784
  n_f_per_cluster: 3
  l_token: 10
  sample_len: 500
  data_path: /zangzelin/data
model:
  class_num: 10
  w: 1
  loss_rec_weight: 1.0
  l_token: 50
  sample_len: 500
  num_input_dim: 784
  num_layers_Transformer: 2
  l_token_2: 50
  nu: 0.001
  trans_embedding_size: 64
  num_attention_heads: 6
trainer:
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      name: test
      project: DMTEVT
      save_dir: wandb
  # callbacks:
  #   - class_path: lightning.pytorch.callbacks.ModelCheckpoint
  #     init_args:
  #       monitor: SVC_train
  #       dirpath: ./checkpoints
  #       filename: mnist-best-{epoch:03d}-{SVC_train:.5f}
  #       save_top_k: 2
  #       mode: max
  max_epochs: 8000
  devices: [0,1,2,3]
  accelerator: gpu
  strategy: deepspeed
  precision: 16
  check_val_every_n_epoch: 100
  enable_checkpointing: True
  enable_progress_bar: True
# trainer.strategy: ddp_find_unused_parameters_true
# trainer.strategy: ddp