seed_everything: 42

data:
  class_path: data_model.datamodel_tri_test.MyDataModule
  init_args:
    data_name: nhpcaTOP5
    pca_dim: 128
    batch_size: 1000
    num_workers: 1
    K: 5
    n_f_per_cluster: 3
    l_token: 10
    data_path: /storage/zangzelin/data


model:
  class_path: model.nnet_new_exp_mix_in_lat_exp_all_resnet.DMTEVT_model
  init_args:
    num_input_dim: 50
    # sigma: 0.05
    lr: 0.005 # 0.001, 0.005, 0.01
    # w_nb: 1 # not change
    # w_fp: 1 # not change
    # weight_nepo: 0.9 # 0.1, 0.2, 0.5, 1, 2, 5
    # weight_mse: 0 # 0.1, 0.2, 0.5, 1, 2, 5
    # sample_rate_feature: 0.9
    nu_lat: 1
    nu_emb: 1
    exaggeration_lat: 4
    exaggeration_emb: 4
    sample_rate_feature: 1.0
    # T_num_attention_heads: 48
    T_hidden_size: 512
    weight_decay: 0.000000001
    num_use_moe: 1
    T_num_layers: 8
    max_epochs: 300
    # p3: 0
    # use_orthogonal: True
    # T_intermediate_size: 300
    # T_hidden_dropout_prob: 0.0
    # T_attention_probs_dropout_prob: 0.0
    # num_muti_mask: 10
    # vis_dim: 2
    # trans_out_dim: 2048
    # n_neg_sample: 4


trainer:
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      name: test
      project: DMTNML
      save_dir: wandb
  callbacks:
    - class_path: call_backs.EvalAcc_high_low_emb_bio.EvalCallBack
      init_args:
        inter: 50
        dirpath: 'zzl_checkpoints/'
        fully_eval: true
        dataset: 'nhpca'
  max_epochs: 200
  devices: 8
  accelerator: gpu
  # strategy: deepspeed
  check_val_every_n_epoch: 50
  enable_checkpointing: True
  # enable_progress_bar: False
# trainer.strategy: ddp_find_unused_parameters_true
# trainer.strategy: ddp