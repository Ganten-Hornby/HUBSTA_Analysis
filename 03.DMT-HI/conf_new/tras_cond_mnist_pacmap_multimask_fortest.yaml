seed_everything: 42

data:
  class_path: data_model.datamodel.MyDataModule
  init_args:
    data_name: Mnist
    pca_dim: 64
    batch_size: 2000
    num_workers: 5
    K: 3
    n_f_per_cluster: 3
    l_token: 10
    data_path: /zangzelin/data

model:
  class_path: model.tran_nnet_exp_cond_pacmap_mutimask.DMTEVT_model
  init_args:
    num_input_dim: 784
    sigma: 0.05
    lr: 0.001
    w_nb: 1
    w_fp: 5
    weight_mse: 1
    weight_nepo: 1
    sample_rate_feature: 0.1
    T_num_layers: 2
    T_num_attention_heads: 14
    T_hidden_size: 784
    T_intermediate_size: 600
    T_hidden_dropout_prob: 0.0
    T_attention_probs_dropout_prob: 0.0
    ckpt_path: 'zzl_checkpoints/mnistepoch599_best_model0.9751999999999998.ckpt'
  
trainer:
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      name: test
      project: DMTNML
      save_dir: wandb
  callbacks:
    - class_path: call_backs.EvalAcc.EvalCallBack
      init_args:
        inter: 100
    - class_path: call_backs.MaskExp.MaskExpCallBack
      init_args:
        inter: 100
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        dirpath: 'zzl_checkpoints/'  
        filename: 'mnist-{epoch:05d}'  
    # - class_path: call_backs.Logtau.LogTauCallBack
    #   init_args:
    #     inter: 100
  max_steps: 72000
  devices: 1
  accelerator: gpu
  check_val_every_n_epoch: 50

  enable_checkpointing: True
  # enable_progress_bar: False
# trainer.strategy: ddp_find_unused_parameters_true
# trainer.strategy: ddp
