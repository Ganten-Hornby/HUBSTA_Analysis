seed_everything: 42

data:
  class_path: data_model.datamodel_multi_test.MyDataModule
  init_args:
    data_name: SAMUSIK
    pca_dim: 38
    batch_size: 2000
    num_workers: 5
    K: 3 # 3, 5, 7
    n_f_per_cluster: 3
    l_token: 10
    data_path: /zangzelin/data

model:
  class_path: model.tran_nnet_exp_cond_pacmap_mutimask_multi_test.DMTEVT_model
  init_args:
    num_input_dim: 38
    sigma: 0.05
    lr: 0.001 # 0.001, 0.005, 0.01
    w_nb: 1 # not change
    w_fp: 1 # not change
    weight_nepo: 1 # 0.1, 0.2, 0.5, 1, 2, 5
    weight_mse: 1 # 0.1, 0.2, 0.5, 1, 2, 5
    sample_rate_feature: 0.1 
    T_num_layers: 2
    T_num_attention_heads: 38
    T_hidden_size: 38
    T_intermediate_size: 600
    T_hidden_dropout_prob: 0.0
    T_attention_probs_dropout_prob: 0.0
    num_muti_mask: 10
    num_train_data: 69491

  
trainer:
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      name: test
      project: DMTNML
      save_dir: wandb
  callbacks:
    - class_path: call_backs.EvalAcc.EvalCallBack
      init_args:
        inter: 10
    - class_path: call_backs.Logtau.LogTauCallBack
      init_args:
        inter: 10
  max_epochs: 2000
  devices: 1
  accelerator: gpu
  check_val_every_n_epoch: 500

  enable_checkpointing: True
  # enable_progress_bar: False
# trainer.strategy: ddp_find_unused_parameters_true
# trainer.strategy: ddp
