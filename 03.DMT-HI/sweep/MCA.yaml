program: main.py
method: bayes
project: DMTNML
name: sweepMCA
metric:
  goal: maximize
  name: SVC_val
parameters:
  config:
    values: ['conf_new/cond_MCA_trans.yaml']
  model.init_args.weight_mse:
    min: 0.1
    max: 10.0
  model.init_args.weight_nepo:
    min: 0.1
    max: 10.0
  model.lr:
    min: 0.001
    max: 0.010
  model.sample_rate_feature:
    min: 0.01
    max: 0.15
  model.tau:
    min: 1.01
    max: 5.0
  trainer.enable_progress_bar: 
    values: [False]
command:
  - ${env}
  - ${interpreter}
  - ${program}
  - fit
  - ${args}

