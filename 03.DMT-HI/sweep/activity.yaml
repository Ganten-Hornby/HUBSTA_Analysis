program: main.py
method: bayes
project: DMTNML
name: sweepActivity
metric:
  goal: maximize
  name: SVC_val
parameters:
  config:
    values: ['conf_new/cond_activity_trans.yaml']
  model.init_args.weight_mse:
    min: 4.0
    max: 15.0
  model.init_args.weight_nepo:
    min: 0.1
    max: 10.0
  model.lr:
    min: 0.0001
    max: 0.006
  model.sample_rate_feature:
    min: 0.01
    max: 0.25
  model.tau:
    min: 2
    max: 5
  model.T_num_layers:
    min: 2
    max: 4
  trainer.enable_progress_bar: 
    values: [False]
command:
  - ${env}
  - ${interpreter}
  - ${program}
  - fit
  - ${args}

