program: main.py
method: grid
project: DMTNML_huada
name: sweepHCL
metric:
  goal: maximize
  name: SVC_val
parameters:
  config:
    values: ['conf_new/huada/HD_AQC640k.yaml']
  data.K:
    values: [10, 20, 25, 30]
  model.nu_lat:
    values: [0.05, 0.1, 0.2]
  model.nu_emb:
    values: [0.1,]
  model.T_num_layers:
    values: [4,5,6]
  data.batch_size:
    values: [2000]
  model.T_hidden_size:
    values: [512, 1024]
  model.exaggeration_lat:
    values: [1,2]
  model.exaggeration_emb:
    values: [4]
  model.num_use_moe:
    values: [1, 2,]
command:
  - ${env}
  - ${interpreter}
  - ${program}
  - fit
  - ${args}

