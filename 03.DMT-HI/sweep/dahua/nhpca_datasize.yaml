program: main.py
method: grid
project: DMTNML
name: sweepHCL
metric:
  goal: maximize
  name: SVC_val
parameters:
  config:
    values: ['conf_new/huada/nhpca_v1_1gpu.yaml']
  data.K:
    values: [35]
  model.nu_lat:
    values: [0.1]
  model.nu_emb:
    values: [0.02]
  model.T_num_layers:
    values: [2,]
  data.batch_size:
    values: [3000]
  model.T_hidden_size:
    values: [2048]
  model.exaggeration_lat:
    values: [4]
  model.exaggeration_emb:
    values: [4]
  trainer.max_epochs:
    values: [1000]
  model.max_epochs:
    values: [1000]
  data.data_name:
    values: [
      'nhpca10k', 'nhpca20k', 'nhpca40k', 'nhpca80k', 
      'nhpca160k', 'nhpca320k', 'nhpca640k', 'nhpca', 
      ]
command:
  - ${env}
  - ${interpreter}
  - ${program}
  - fit
  - ${args}

