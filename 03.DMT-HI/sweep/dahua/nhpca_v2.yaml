program: main.py
method: grid
project: DMTNML
name: sweepHCL
metric:
  goal: maximize
  name: SVC_val
parameters:
  config:
    values: ['conf_new/huada/nhpca_v1.yaml']
  data.K:
    values: [3, 5, 10, 15]
  model.nu_lat:
    values: [0.02, 0.05, 0.1]
  model.nu_emb:
    values: [0.02, 0.05, 0.1]
  model.T_num_layers:
    values: [2, 4,]
  data.batch_size:
    values: [1000, 2000, 3000]
  model.T_hidden_size:
    values: [512, 1024, 2048]
command:
  - ${env}
  - ${interpreter}
  - ${program}
  - fit
  - ${args}

