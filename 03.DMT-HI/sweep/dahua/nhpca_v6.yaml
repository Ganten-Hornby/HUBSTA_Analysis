program: main.py
method: grid
project: DMTNML_huada
name: sweepHCL
metric:
  goal: maximize
  name: SVC_val
parameters:
  config:
    values: ['conf_new/huada/nhpca_v1.yaml']
  data.K:
    values: [20, 25, 30]
  model.nu_lat:
    values: [0.05, 0.1, 0.2]
  model.nu_emb:
    values: [0.02]
  model.T_num_layers:
    values: [4,5,6]
  data.batch_size:
    values: [2000, 4000, 5000]
  model.T_hidden_size:
    values: [8192]
  model.exaggeration_lat:
    values: [1]
  model.exaggeration_emb:
    values: [4]
  model.num_use_moe:
    values: [1, 2, 3,4,5,6,7]
command:
  - ${env}
  - ${interpreter}
  - ${program}
  - fit
  - ${args}

