program: main.py
method: bayes
project: DMTNML
name: sweepS2
metric:
  goal: maximize
  name: SVC_val
parameters:
  config:
    values: ['conf_new/cond_fmnist.yaml']
  model.init_args.weight_mse:
    min: 2
    max: 5
  model.init_args.weight_nepo:
    min: 10
    max: 20
  model.lr:
    min: 0.001
    max: 0.005
  model.sample_rate_feature:
    min: 0.4
    max: 0.8
  model.tau:
    min: 1
    max: 5
  model.sigma:
    min: 0.01
    max: 0.1
  trainer.enable_progress_bar: 
    values: [False]
command:
  - ${env}
  - ${interpreter}
  - ${program}
  - fit
  - ${args}

