program: main.py
method: bayes
project: DMTNML
name: sweepKMnist
metric:
  goal: maximize
  name: val2
parameters:
  config:
    values: ['conf_new/test.yaml']
  model.init_args.weight_mse:
    min: 0.1
    max: 10.0
  model.init_args.weight_nepo:
    min: 0.1
    max: 10.0
  model.lr:
    min: 0.0005
    max: 0.010
  model.sample_rate_feature:
    min: 0.01
    max: 0.30
command:
  - ${env}
  - ${interpreter}
  - ${program}
  - fit
  - ${args}
n_iter: 50

