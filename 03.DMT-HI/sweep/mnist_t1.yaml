program: main.py
method: grid
project: DMTNML
name: sweep
metric:
  goal: maximize
  name: SVC_val
parameters:
  config:
    values: ['conf_new/cond_mnist.yaml']
  model.init_args.weight_mse:
    values: [2, 5, 10]
  model.init_args.weight_nepo:
    values: [10, 20]
  model.lr:
    values: [0.0002, 0.0005, 0.001]
  model.sample_rate_feature:
    values: [0.2, 0.4, 0.8, 1.0]
  model.tau:
    values: [1, 2, 5,]
  model.sigma:
    values: [0.1, 0.05, 0.02, 0.01]
  trainer.enable_progress_bar: 
    values: [False]
command:
  - ${env}
  - ${interpreter}
  - ${program}
  - fit
  - ${args}

