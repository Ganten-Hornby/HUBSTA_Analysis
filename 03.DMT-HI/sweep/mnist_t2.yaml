program: main.py
method: grid
project: DMTNML
name: sweep
metric:
  goal: maximize
  name: SVC_val
parameters:
  config:
    values: ['conf_new/cond_mnist.yaml']
  model.init_args.weight_mse:
    values: [5]
  model.init_args.weight_nepo:
    values: [2, 5, 10]
  model.lr:
    values: [0.0005]
  model.sample_rate_feature:
    values: [0.2, 0.4, 0.8, 1.0]
  model.tau:
    values: [20,30,50]
  model.sigma:
    values: [0.2, 0.1, 0.05]
  trainer.enable_progress_bar: 
    values: [False]
  data.init_args.K:
    values: [3,5,7,9]
command:
  - ${env}
  - ${interpreter}
  - ${program}
  - fit
  - ${args}

