program: main.py
method: grid
project: DMTNML
name: sweep
metric:
  goal: maximize
  name: SVC_val
parameters:
  config:
    values: ['conf_new/cond_mnist_pacmap.yaml']
  model.init_args.weight_mse:
    values: [5]
  model.lr:
    values: [0.005, 0.01, 0.02, 0.05]
  model.w_nb:
    values: [0.2, 0.5, 1, 2]
  model.w_fp:
    values: [1, 2, 5, 10]
  data.init_args.batch_size:
    values: [5000]
command:
  - ${env}
  - ${interpreter}
  - ${program}
  - fit
  - ${args}

