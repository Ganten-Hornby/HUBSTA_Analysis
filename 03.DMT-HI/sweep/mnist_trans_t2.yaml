program: main.py
method: grid
project: DMTNML
name: sweep
metric:
  goal: maximize
  name: SVC_val
parameters:
  config:
    values: ['conf_new/transf_cond_mnist_pacmap_multi_posi.yaml']
  model.init_args.T_num_layers:
    values: [1,2,3,4]
  model.T_num_attention_heads:
    values: [14]
  model.T_hidden_size:
    values: [784]
  model.T_intermediate_size:
    values: [300]
  model.T_hidden_dropout_prob:
    values: [0.0]
  model.T_attention_probs_dropout_prob:
    values: [0.0]
  model.lr:
    values: [0.0001, 0.0002]
  data.init_args.batch_size:
    values: [1000, 2000, 3000, ]
  model.init_args.weight_mse:
    values: [0, 1]
  model.init_args.w_nb:
    values: [1, 0.5, 0.2]
  model.init_args.w_fp:
    values: [1, 0.5, 0.2]
command:
  - ${env}
  - ${interpreter}
  - ${program}
  - fit
  - ${args}

