program: main.py
method: bayes
project: DMTNML
name: sweepACT2
metric:
  goal: maximize
  name: train_svc
parameters:
  config:
    values: ['conf_new/nml/ACT.yaml']
  model.sample_rate_feature:
    min: 0.05
    max: 0.95
  model.exaggeration_lat:
    min: 0.5
    max: 5.0
  model.exaggeration_emb:
    min: 0.5
    max: 5.0
  model.nu_lat:
    min: 0.01
    max: 1.0
  model.nu_emb:
    min: 0.01
    max: 1.0
  model.lr:
    values: [0.00001,0.00003,0.0001,0.0003,0.001,0.003,0.01,0.03,0.1]
command:
  - ${env}
  - ${interpreter}
  - ${program}
  - fit
  - ${args}

