program: main.py
method: bayes
project: DMTNML
name: sweepcoil20
metric:
  goal: maximize
  name: val2
parameters:
  config:
    values: ['conf_new/nml/cond_coil20_newloss.yaml']
  model.exaggeration_lat:
    min: 3
    max: 12
  model.exaggeration_emb:
    min: 3
    max: 12
  model.nu_lat:
    min: 0.0001
    max: 0.001
  model.nu_emb:
    min: 0.0001
    max: 0.001
  model.lr:
    min: 0.0001
    max: 0.010
  data.init_args.K:
    values: [2,3,4]
command:
  - ${env}
  - ${interpreter}
  - ${program}
  - fit
  - ${args}

