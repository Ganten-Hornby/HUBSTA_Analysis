program: main.py
method: grid
project: DMTNML
name: sweepKMnistp5
parameters:
  config:
    values: ['conf_new/nml4_zzl/kmnist.yaml']
  model.nu_lat:
    values: [0.0005, 0.001, 0.005, 0.01]
  model.nu_emb:
    values: [0.0005, 0.001, 0.005, 0.01]
  model.T_num_layers:
    values: [8]
  data.batch_size:
    values: [200, 400, 800, 1000]
  data.K:
    values: [3, 5, 10]
command:
  - ${env}
  - ${interpreter}
  - ${program}
  - fit
  - ${args}

